run_name: qwen3_rank_books_srpd_v3
domain: books
task: candidate_ranking
srpd_stage: v3
method_variant: SRPD-v3_pairwise_preference_enhanced

base_input_path: data/processed/amazon_books_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/books_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
pairwise_preference_path: outputs/books_deepseek_pairwise_coverage_to_rank/tables/pairwise_preference_rows.csv
max_pairwise_preferences_per_event: 12
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.25
  uncertainty_scale: 0.5
  risk_scale: 0.1
  pairwise_scale: 0.2
  min_weight: 0.5
  max_weight: 2.2

output_train_path: data/processed/amazon_books_small/srpd/qwen3_rank_books_srpd_v3_train.jsonl
output_valid_path: data/processed/amazon_books_small/srpd/qwen3_rank_books_srpd_v3_valid.jsonl
summary_path: outputs/summary/week7_6_books_srpd_v3_data_summary.csv
markdown_path: outputs/summary/week7_6_books_srpd_v3_data_summary.md

notes: >
  Books compact SRPD-v3 alignment adds pairwise preference mechanism on top of the structured-risk
  teacher and uncertainty-aware weights.
