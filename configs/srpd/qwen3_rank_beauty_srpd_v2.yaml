run_name: qwen3_rank_beauty_srpd_v2
domain: beauty
task: candidate_ranking
srpd_stage: v2
method_variant: SRPD-v2_uncertainty_weighted_sft

base_input_path: data/processed/amazon_beauty/ranking_test.jsonl
structured_risk_teacher_path: outputs/beauty_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.25
  uncertainty_scale: 0.5
  risk_scale: 0.1
  min_weight: 0.5
  max_weight: 2.0

output_train_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_train.jsonl
output_valid_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_valid.jsonl
summary_path: outputs/summary/week7_6_srpd_v2_data_summary.csv
markdown_path: outputs/summary/week7_6_srpd_v2_data_summary.md

notes: >
  SRPD-v2 keeps the structured-risk teacher target and adds uncertainty-aware sample weights.
  The prepared weight is recorded in srpd_sample_weight for later weighted-loss activation.
