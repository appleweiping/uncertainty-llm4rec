run_name: qwen3_rank_books_srpd_v5_small500
domain: books
task: candidate_ranking
srpd_stage: v5
method_variant: SRPD-v5_gap_gated_direct_anchor_sft_small500

base_input_path: data/processed/amazon_books_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/books_deepseek_rank_full500_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.12
  uncertainty_scale: 0.3
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.45
  gate:
    mode: teacher_gap
    fallback_weight: 1.0
    gate_boost: 0.03
    min_effective_uncertainty: 0.0
    min_risk_weight: 0.0

output_train_path: data/processed/amazon_books_small/srpd/qwen3_rank_books_srpd_v5_small500_train.jsonl
output_valid_path: data/processed/amazon_books_small/srpd/qwen3_rank_books_srpd_v5_small500_valid.jsonl
summary_path: outputs/summary/books_srpd_v5_small500_data_summary.csv
markdown_path: outputs/summary/books_srpd_v5_small500_data_summary.md

notes: >
  Books SRPD-v5 preserves the v4 teacher-gap gate and adds a direct-anchor target rule: when the
  structured-risk teacher does not improve the positive item's position over direct ranking, the
  supervised target falls back to the direct ranking order instead of forcing teacher imitation.
