run_name: qwen3_rank_movies_srpd_v6_small500
domain: movies
task: candidate_ranking
srpd_stage: v6
method_variant: SRPD-v6_gap_gated_dpo_preference_sft_small500

base_input_path: data/processed/amazon_movies_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/movies_deepseek_rank_full500_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.15
  uncertainty_scale: 0.35
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.6
  gate:
    mode: teacher_gap
    fallback_weight: 1.0
    gate_boost: 0.05
    min_effective_uncertainty: 0.0
    min_risk_weight: 0.0

preference_training:
  enabled: true
  require_gap_or_uncertainty: true
  max_pairs_per_event: 4
  teacher_topn: 4
  min_score_gap: 0.0
  min_effective_uncertainty: 0.0
  min_risk_weight: 0.0
  include_positive_gain_pair: true
  include_teacher_order_pairs: true
  base_pair_weight: 1.0

output_train_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v6_small500_train.jsonl
output_valid_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v6_small500_valid.jsonl
summary_path: outputs/summary/movies_srpd_v6_small500_data_summary.csv
markdown_path: outputs/summary/movies_srpd_v6_small500_data_summary.md

notes: >
  Movies SRPD-v6 tests whether explicit chosen/rejected preference supervision
  can improve the v4 failed-domain repair without overwriting the direct baseline contract.
