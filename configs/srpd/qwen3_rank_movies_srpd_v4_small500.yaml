run_name: qwen3_rank_movies_srpd_v4_small500
domain: movies
task: candidate_ranking
srpd_stage: v4
method_variant: SRPD-v4_gap_gated_uncertainty_sft_small500

base_input_path: data/processed/amazon_movies_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/movies_deepseek_rank_full500_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.15
  uncertainty_scale: 0.35
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.6
  gate:
    mode: teacher_gap
    fallback_weight: 1.0
    gate_boost: 0.05
    min_effective_uncertainty: 0.0
    min_risk_weight: 0.0

output_train_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v4_small500_train.jsonl
output_valid_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v4_small500_valid.jsonl
summary_path: outputs/summary/movies_srpd_v4_small500_data_summary.csv
markdown_path: outputs/summary/movies_srpd_v4_small500_data_summary.md

notes: >
  Movies SRPD-v4 introduces gap-gated uncertainty weighting: when structured-risk teacher and
  direct ranking agree, the sample falls back to near-v1 weighting; stronger uncertainty weighting
  is activated only on teacher-gap events.
