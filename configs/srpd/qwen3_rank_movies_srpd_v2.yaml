run_name: qwen3_rank_movies_srpd_v2
domain: movies
task: candidate_ranking
srpd_stage: v2
method_variant: SRPD-v2_uncertainty_weighted_sft

base_input_path: data/processed/amazon_movies_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/movies_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.25
  uncertainty_scale: 0.5
  risk_scale: 0.1
  min_weight: 0.5
  max_weight: 2.0

output_train_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v2_train.jsonl
output_valid_path: data/processed/amazon_movies_small/srpd/qwen3_rank_movies_srpd_v2_valid.jsonl
summary_path: outputs/summary/week7_6_movies_srpd_v2_data_summary.csv
markdown_path: outputs/summary/week7_6_movies_srpd_v2_data_summary.md

notes: >
  Movies compact SRPD-v2 teacher-data alignment with uncertainty-aware sample weights.
