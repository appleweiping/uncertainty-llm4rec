run_name: qwen3_rank_beauty_srpd_v6_full973
domain: beauty
task: candidate_ranking
srpd_stage: v6
method_variant: SRPD-v6_gap_gated_dpo_preference_sft_full973

base_input_path: data/processed/amazon_beauty/ranking_test.jsonl
structured_risk_teacher_path: outputs/beauty_deepseek_rank_full973_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.15
  uncertainty_scale: 0.35
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.6
  gate:
    mode: teacher_gap
    fallback_weight: 1.0
    gate_boost: 0.05
    min_effective_uncertainty: 0.0
    min_risk_weight: 0.0

preference_training:
  enabled: true
  require_gap_or_uncertainty: true
  max_pairs_per_event: 4
  teacher_topn: 4
  min_score_gap: 0.0
  min_effective_uncertainty: 0.0
  min_risk_weight: 0.0
  include_positive_gain_pair: true
  include_teacher_order_pairs: true
  base_pair_weight: 1.0

output_train_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v6_full973_train.jsonl
output_valid_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v6_full973_valid.jsonl
summary_path: outputs/summary/week7_7_srpd_v6_full973_data_summary.csv
markdown_path: outputs/summary/week7_7_srpd_v6_full973_data_summary.md

notes: >
  Beauty full973 SRPD-v6 keeps the v4 gap-gated uncertainty weighting and adds
  DPO-style chosen/rejected preference pairs derived from structured-risk teacher
  order and uncertainty-gated teacher-gap events.
