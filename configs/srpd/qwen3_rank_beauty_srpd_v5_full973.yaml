run_name: qwen3_rank_beauty_srpd_v5_full973
domain: beauty
task: candidate_ranking
srpd_stage: v5
method_variant: SRPD-v5_gap_gated_direct_anchor_sft_full973

base_input_path: data/processed/amazon_beauty/ranking_test.jsonl
structured_risk_teacher_path: outputs/beauty_deepseek_rank_full973_structured_risk/reranked/rank_reranked.jsonl
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.12
  uncertainty_scale: 0.3
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.45
  gate:
    mode: teacher_gap
    fallback_weight: 1.0
    gate_boost: 0.03
    min_effective_uncertainty: 0.0
    min_risk_weight: 0.0

output_train_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v5_full973_train.jsonl
output_valid_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v5_full973_valid.jsonl
summary_path: outputs/summary/week7_7_srpd_v5_full973_data_summary.csv
markdown_path: outputs/summary/week7_7_srpd_v5_full973_data_summary.md

notes: >
  Beauty full973 SRPD-v5 preserves the v4 teacher-gap gate and adds a direct-anchor target rule:
  when the structured-risk teacher does not improve the positive item's position over direct ranking,
  the supervised target falls back to the direct ranking order instead of forcing teacher imitation.
