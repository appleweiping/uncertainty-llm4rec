run_name: qwen3_rank_electronics_srpd_v3_small500
domain: electronics
task: candidate_ranking
srpd_stage: v3
method_variant: SRPD-v3_pairwise_preference_enhanced_small500

base_input_path: data/processed/amazon_electronics_small/ranking_test.jsonl
structured_risk_teacher_path: outputs/electronics_deepseek_rank_full500_structured_risk/reranked/rank_reranked.jsonl
pairwise_preference_path: outputs/electronics_deepseek_pairwise_coverage_full500_to_rank/tables/pairwise_preference_rows.csv
max_pairwise_preferences_per_event: 12
train_ratio: 0.8

weighting:
  base: 1.0
  disagreement_bonus: 0.25
  uncertainty_scale: 0.5
  risk_scale: 0.1
  pairwise_scale: 0.2
  min_weight: 0.5
  max_weight: 2.2

output_train_path: data/processed/amazon_electronics_small/srpd/qwen3_rank_electronics_srpd_v3_small500_train.jsonl
output_valid_path: data/processed/amazon_electronics_small/srpd/qwen3_rank_electronics_srpd_v3_small500_valid.jsonl
summary_path: outputs/summary/electronics_srpd_v3_small500_data_summary.csv
markdown_path: outputs/summary/electronics_srpd_v3_small500_data_summary.md

notes: >
  Electronics small-full SRPD-v3 alignment adds pairwise preference mechanism on top of the 500-row
  structured-risk teacher and uncertainty-aware weights.
