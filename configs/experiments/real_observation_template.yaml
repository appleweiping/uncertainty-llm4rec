template: true
dry_run: true
requires_confirm: true
seed: 13
run_name: real_observation_TBD
output_dir: outputs/real_runs/observation
domain: TBD
dataset:
  name: TBD
  config_path: TBD
  raw_data_path: TBD
  processed_dir: TBD
split: test
split_strategy:
  name: temporal_or_leave_one_out_TBD
  timestamp_field: timestamp
  future_interactions: forbidden
  history_policy: past_interactions_only
  repeat_target_policy: TBD_document_before_real_run
candidate:
  protocol: shared_sampled_TBD
  k: 100
  seed: 13
  set_path: TBD
  negative_sampling: fixed_seed_shared_negatives_TBD
  target_policy: include_heldout_target_for_main_eval
  target_excluding_protocol: diagnostic_only_not_accuracy
  same_set_for_comparable_baselines: true
data_protocol:
  interaction_schema: [user_id, item_id, timestamp, rating, domain]
  item_schema: [item_id, title, description, category, brand, domain, raw_text]
  user_item_id_mapping: required_saved_in_processed_artifacts
  timestamp_handling: required_for_temporal_or_document_leave_one_out_order
  train_popularity_source: train_split_only
  domain_field: domain
  candidate_set_saved_path: TBD
method:
  name: llm_confidence_observation
  type: llm
  seed: 13
  params:
    prediction_method: llm_confidence_observation_TBD
    text_policy: title
llm:
  config_path: configs/llm/mock.yaml
  provider: mock
  response_mode: generative_correct
  allow_api_calls: false
  allow_download: false
  allow_training: false
  requires_confirm: true
  notes: replace_with_confirmed_api_or_hf_provider_for_real_run
evaluation:
  config_path: configs/evaluation/full.yaml
  top_k: [1, 5, 10, 20]
top_k: [1, 5, 10, 20]
metrics: [ranking, validity, confidence, calibration, coverage, diversity, novelty, long_tail, efficiency]
analysis_outputs: [reliability_diagram_csv, risk_coverage_csv, confidence_by_popularity_bucket_csv, case_study_samples]
safety:
  allow_api_calls: false
  allow_download: false
  allow_training: false
  acknowledged_expensive_run: false
  leakage_safeguards: true
logging:
  level: INFO
output:
  run_name: real_observation_TBD
  output_dir: outputs/real_runs/observation
