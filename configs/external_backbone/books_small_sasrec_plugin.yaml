backbone_name: sasrec
domain: books
stage: small_cross_domain_sanity
train_input_path: data/processed/amazon_books_small/train.jsonl
valid_input_path: data/processed/amazon_books_small/valid.jsonl
test_input_path: data/processed/amazon_books_small/test.jsonl
score_output_path: output-repaired/backbone/sasrec_books_small/candidate_scores.csv
evidence_table:
  path: output-repaired/books_small_deepseek_relevance_evidence/calibrated/relevance_evidence_posterior_test.jsonl
  join_keys:
    - user_id
    - candidate_item_id
  fields:
    - relevance_probability
    - calibrated_relevance_probability
    - evidence_risk
    - ambiguity
    - missing_information
    - abs_evidence_margin
    - positive_evidence
    - negative_evidence
rerank:
  top_k: 10
  normalizations:
    - minmax
    - zscore
  lambdas:
    - 0.0
    - 0.05
    - 0.1
    - 0.2
    - 0.5
  alphas:
    - 0.5
    - 0.75
    - 0.9
  metric_note: small domains are sanity settings. If candidate pool <= 10, HR@10 is trivial and not a primary claim.
