backbone_name: llmemb
domain: beauty
stage: day12_smoke

score_table:
  path: output-repaired/backbone/llmemb_beauty_100/candidate_scores.csv
  required_columns:
    - user_id
    - candidate_item_id
    - backbone_score
    - label
  optional_columns:
    - backbone_rank
    - split
    - raw_user_id
    - raw_item_id
    - mapped_user_id
    - mapped_item_id
    - mapping_success

evidence_table:
  path: output-repaired/beauty_deepseek_relevance_evidence_full/calibrated/relevance_evidence_posterior_test.jsonl
  join_keys:
    - user_id
    - candidate_item_id
  fields:
    - relevance_probability
    - calibrated_relevance_probability
    - evidence_risk
    - ambiguity
    - missing_information
    - abs_evidence_margin
    - positive_evidence
    - negative_evidence

outputs:
  joined_candidates: output-repaired/summary/day12_llmemb_beauty_100_joined_candidates.csv
  join_diagnostics: output-repaired/summary/day12_llmemb_beauty_100_join_diagnostics.csv
  rerank_grid: output-repaired/summary/day12_llmemb_beauty_100_plugin_rerank_grid.csv
  plugin_diagnostics: output-repaired/summary/day12_llmemb_beauty_100_plugin_diagnostics.csv
  report: output-repaired/summary/day12_llmemb_plugin_smoke_report.md

rerank:
  top_k: 10
  normalizations:
    - minmax
    - zscore
  lambdas:
    - 0.0
    - 0.05
    - 0.1
    - 0.2
  alpha: 0.75
  beta: 0.25
  settings:
    - Backbone only
    - Backbone + evidence_risk
    - Backbone + calibrated relevance
    - Backbone + calibrated relevance + evidence_risk

readiness:
  min_join_coverage: 0.8
  first_smoke_users: 100
  do_not_interpret_performance_if_join_coverage_below: 0.8
