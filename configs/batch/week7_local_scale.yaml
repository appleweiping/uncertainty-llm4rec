batch_name: week7_local_scale
description: Week7 local-HF smoke batch for Qwen3-8B pointwise, candidate ranking, and pairwise tasks.
python_bin: python
status_path: outputs/summary/week7_day2_batch_status.csv
log_dir: outputs/logs/batch/week7_local_scale

experiments:
  - exp_name: beauty_qwen3_local_pointwise_smoke
    domain: beauty
    task: pointwise_yesno
    model: qwen3_8b_local
    method_family: local_hf_base_only
    method_variant: pointwise_smoke
    config_path: configs/exp/beauty_qwen3_local_pointwise_smoke.yaml
    enabled: true
  - exp_name: beauty_qwen3_local_rank_smoke
    domain: beauty
    task: candidate_ranking
    model: qwen3_8b_local
    method_family: local_hf_base_only
    method_variant: candidate_ranking_smoke
    config_path: configs/exp/beauty_qwen3_local_rank_smoke.yaml
    enabled: true
  - exp_name: beauty_qwen3_local_pairwise_smoke
    domain: beauty
    task: pairwise_preference
    model: qwen3_8b_local
    method_family: local_hf_base_only
    method_variant: pairwise_smoke
    config_path: configs/exp/beauty_qwen3_local_pairwise_smoke.yaml
    enabled: true
