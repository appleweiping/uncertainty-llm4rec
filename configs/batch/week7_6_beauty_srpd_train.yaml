batch_name: week7_6_beauty_srpd_train
status_path: outputs/summary/week7_6_beauty_srpd_train_status.csv
log_dir: outputs/logs/batch/week7_6_beauty_srpd_train
python_bin: python
default_run: false

experiments:
  - exp_name: build_srpd_v1_teacher_data
    task: srpd_data_build
    domain: beauty
    model: deepseek_teacher_to_qwen3
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft
    config_path: configs/srpd/qwen3_rank_beauty_srpd_v1.yaml
    input_path: outputs/beauty_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
    output_dir: data/processed/amazon_beauty/srpd
    command: python main_build_srpd_rank_data.py --config configs/srpd/qwen3_rank_beauty_srpd_v1.yaml
    notes: Build structured-risk teacher SFT data for SRPD-v1.

  - exp_name: build_srpd_v2_teacher_data
    task: srpd_data_build
    domain: beauty
    model: deepseek_teacher_to_qwen3
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft
    config_path: configs/srpd/qwen3_rank_beauty_srpd_v2.yaml
    input_path: outputs/beauty_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
    output_dir: data/processed/amazon_beauty/srpd
    command: python main_build_srpd_rank_data.py --config configs/srpd/qwen3_rank_beauty_srpd_v2.yaml
    notes: Build uncertainty-weighted structured-risk teacher data for SRPD-v2.

  - exp_name: build_srpd_v3_teacher_data
    task: srpd_data_build
    domain: beauty
    model: deepseek_teacher_to_qwen3
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced
    config_path: configs/srpd/qwen3_rank_beauty_srpd_v3.yaml
    input_path: outputs/beauty_deepseek_pairwise_coverage_to_rank/tables/pairwise_preference_rows.csv
    output_dir: data/processed/amazon_beauty/srpd
    command: python main_build_srpd_rank_data.py --config configs/srpd/qwen3_rank_beauty_srpd_v3.yaml
    notes: Build pairwise-preference-enhanced SRPD-v3 data.

  - exp_name: srpd_v1_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v1_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1.yaml --startup_check
    notes: Validate SRPD-v1 train/eval inputs before training.

  - exp_name: srpd_v1_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v1_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v1
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1.yaml
    notes: Train SRPD-v1 structured-risk teacher SFT adapter.

  - exp_name: srpd_v1_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v1
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1.yaml --overwrite
    notes: Evaluate SRPD-v1 on Beauty candidate ranking.

  - exp_name: srpd_v2_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2.yaml --startup_check
    notes: Validate SRPD-v2 train/eval inputs before training.

  - exp_name: srpd_v2_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v2
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2.yaml
    notes: Train SRPD-v2 uncertainty-weighted adapter.

  - exp_name: srpd_v2_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v2
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2.yaml --overwrite
    notes: Evaluate SRPD-v2 on Beauty candidate ranking.

  - exp_name: srpd_v3_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v3_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3.yaml --startup_check
    notes: Validate SRPD-v3 train/eval inputs before training.

  - exp_name: srpd_v3_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v3_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v3
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3.yaml
    notes: Train SRPD-v3 pairwise-preference-enhanced adapter.

  - exp_name: srpd_v3_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v3
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3.yaml --overwrite
    notes: Evaluate SRPD-v3 on Beauty candidate ranking.

  - exp_name: srpd_v1_v2_v3_compare
    task: candidate_ranking_compare
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: srpd_v1_v2_v3
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/summary
    command: python main_compare_srpd_frameworks.py
    notes: Combine SRPD-v1/v2/v3 framework compare rows after all evaluations finish.
