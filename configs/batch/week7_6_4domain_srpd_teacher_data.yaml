batch_name: week7_6_4domain_srpd_teacher_data
status_path: outputs/summary/week7_6_4domain_srpd_teacher_data_status.csv
log_dir: outputs/logs/batch/week7_6_4domain_srpd_teacher_data
python_bin: python
default_run: false

experiments:
  - exp_name: books_srpd_v1_teacher_data
    task: srpd_data_build
    domain: books
    model: deepseek_teacher
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft
    config_path: configs/srpd/qwen3_rank_books_srpd_v1.yaml
    input_path: outputs/books_deepseek_rank_structured_risk/reranked/rank_reranked.jsonl
    output_dir: data/processed/amazon_books_small/srpd
    command: python main_build_srpd_rank_data.py --config configs/srpd/qwen3_rank_books_srpd_v1.yaml
    notes: Build Books SRPD-v1 teacher data from DeepSeek compact evidence.

