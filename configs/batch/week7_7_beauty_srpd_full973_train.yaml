batch_name: week7_7_beauty_srpd_full973_train
status_path: outputs/summary/week7_7_beauty_srpd_full973_train_status.csv
log_dir: outputs/logs/batch/week7_7_beauty_srpd_full973_train
python_bin: python
default_run: false

experiments:
  - exp_name: srpd_v1_full973_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v1_full973_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml --startup_check
    notes: Validate full973 SRPD-v1 before training.

  - exp_name: srpd_v1_full973_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v1_full973_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v1_full973
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml
    notes: Train SRPD-v1 on the full973 Beauty teacher split.

  - exp_name: srpd_v1_full973_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v1_structured_risk_teacher_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v1_full973
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml --overwrite
    notes: Evaluate full973 SRPD-v1.

  - exp_name: srpd_v2_full973_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_full973_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml --startup_check
    notes: Validate full973 SRPD-v2 before training.

  - exp_name: srpd_v2_full973_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v2_full973_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v2_full973
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml
    notes: Train full973 SRPD-v2, the current trainable main line.

  - exp_name: srpd_v2_full973_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v2_uncertainty_weighted_sft_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v2_full973
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml --overwrite
    notes: Evaluate full973 SRPD-v2.

  - exp_name: srpd_v3_full973_startup_check
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v3_full973_train.jsonl
    output_dir: outputs/summary
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml --startup_check
    notes: Validate full973 SRPD-v3 before training.

  - exp_name: srpd_v3_full973_train
    task: candidate_ranking_train
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml
    input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v3_full973_train.jsonl
    output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v3_full973
    command: python main_lora_train_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml
    notes: Train full973 SRPD-v3 under the retained pairwise-support setting.

  - exp_name: srpd_v3_full973_eval
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: SRPD-v3_pairwise_preference_enhanced_full973
    config_path: configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/beauty_qwen3_rank_srpd_v3_full973
    command: python main_eval_lora_rank.py --config configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml --overwrite
    notes: Evaluate full973 SRPD-v3.

  - exp_name: srpd_full973_compare
    task: candidate_ranking_compare
    domain: beauty
    model: qwen3_8b_local
    method_family: SRPD
    method_variant: srpd_full973_v1_v2_v3
    config_path: configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml
    input_path: data/processed/amazon_beauty/ranking_test.jsonl
    output_dir: outputs/summary
    command: python main_compare_srpd_frameworks.py --configs configs/lora/qwen3_rank_beauty_srpd_v1_full973.yaml configs/lora/qwen3_rank_beauty_srpd_v2_full973.yaml configs/lora/qwen3_rank_beauty_srpd_v3_full973.yaml --output_path outputs/summary/week7_7_srpd_framework_compare_full973.csv --markdown_path outputs/summary/week7_7_srpd_framework_compare_full973.md
    notes: Combine full973 SRPD-v1/v2/v3 into a single Beauty winner-confirmation compare table.
