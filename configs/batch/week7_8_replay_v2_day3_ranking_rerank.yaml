batch_name: week7_8_replay_v2_day3_ranking_rerank
description: Day3 candidate ranking and structured-risk rerank replay batch for the teacher-requested local-v2 mainline.
default_run: false

experiments:
  - exp_name: beauty_qwen3_local_replay_v2_rank_full973
    task: candidate_ranking
    domain: beauty
    model: qwen3_8b_local_replay_v2
    method_family: local_hf_lora_replay
    method_variant: replay_v2_direct_candidate_ranking_full973
    config_path: configs/exp/replay_v2_rank_beauty_full973.yaml
    enabled: true
    notes: Beauty full973 direct replay ranking is the first executable Day3 path.

  - exp_name: beauty_qwen3_local_replay_v2_structured_risk_full973
