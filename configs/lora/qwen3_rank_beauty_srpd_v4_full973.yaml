run_name: qwen3_rank_beauty_srpd_v4_full973
domain: beauty
task: candidate_ranking
method_family: SRPD
method_variant: SRPD-v4_gap_gated_uncertainty_sft_full973
model_name: qwen3_8b_local
base_model_config: configs/model/qwen3_8b_local.yaml
prompt_path: prompts/candidate_ranking.txt

train_input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v4_full973_train.jsonl
valid_input_path: data/processed/amazon_beauty/srpd/qwen3_rank_beauty_srpd_v4_full973_valid.jsonl
eval_input_path: data/processed/amazon_beauty/ranking_test.jsonl

adapter_output_dir: artifacts/adapters/qwen3_rank_beauty_srpd_v4_full973
framework_output_dir: outputs/beauty_qwen3_rank_srpd_v4_full973
logs_dir: artifacts/logs/qwen3_rank_beauty_srpd_v4_full973
output_root: outputs

topk: 10
seed: 42

model:
  model_name_or_path: /home/ajifang/models/Qwen/Qwen3-8B
  tokenizer_name_or_path: /home/ajifang/models/Qwen/Qwen3-8B
  device: cuda
  device_map: cuda:0
  dtype: bfloat16
  local_files_only: true
  trust_remote_code: true

training:
  dry_run: false
  max_train_samples: 778
  max_valid_samples: 195
  num_train_epochs: 2.0
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_ratio: 0.05
  max_seq_length: 1024
  logging_steps: 10
  save_strategy: "no"
  eval_strategy: "epoch"
  gradient_checkpointing: true
  bf16: true
  fp16: false
  include_reason: false
  bias: none
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

evaluation:
  framework_exp_name: beauty_qwen3_rank_srpd_v4_full973
  run_inference_after_train: true
  max_eval_samples: 973
  batch_size: 4
  max_new_tokens: 96
  metrics_output_path: outputs/beauty_qwen3_rank_srpd_v4_full973/tables/ranking_metrics.csv

support_signals:
  structured_risk_teacher_data_config: configs/srpd/qwen3_rank_beauty_srpd_v4_full973.yaml
  pointwise_uncertainty_path: outputs/beauty_qwen3_local_pointwise_full/calibrated/test_calibrated.jsonl
  direct_ranking_exp_name: beauty_qwen3_local_rank_full973
  direct_ranking_metrics_path: outputs/beauty_qwen3_local_rank_full973/tables/ranking_metrics.csv
  structured_risk_exp_name: beauty_qwen3_local_structured_risk_full973
  structured_risk_variant: nonlinear_structured_risk_rerank
  structured_risk_metrics_path: outputs/beauty_qwen3_local_structured_risk_full973/tables/rerank_results.csv
  pairwise_exp_name: beauty_qwen3_local_pairwise_full500
  pairwise_metrics_path: outputs/beauty_qwen3_local_pairwise_full500/tables/pairwise_metrics.csv

summary:
  train_status_path: outputs/summary/week7_7_srpd_train_status_v4_full973.csv
  framework_compare_path: outputs/summary/week7_7_srpd_framework_compare_v4_full973.csv
  framework_compare_markdown_path: outputs/summary/week7_7_srpd_framework_compare_v4_full973.md
  baseline_matrix_source_path: outputs/summary/week7_day4_baseline_matrix.csv
  framework_baseline_bridge_path: outputs/summary/week7_7_srpd_baseline_matrix_v4_full973.csv
  framework_baseline_bridge_markdown_path: outputs/summary/week7_7_srpd_baseline_matrix_v4_full973.md
  startup_check_path: outputs/summary/week7_7_srpd_v4_full973_startup_check.json
  dataset_preview_path: outputs/summary/week7_7_srpd_v4_full973_dataset_preview.csv
  training_summary_path: artifacts/logs/qwen3_rank_beauty_srpd_v4_full973/training_summary.csv
  framework_manifest_path: outputs/beauty_qwen3_rank_srpd_v4_full973/framework_run_manifest.json
  framework_metrics_path: outputs/beauty_qwen3_rank_srpd_v4_full973/tables/ranking_metrics.csv
  direct_ranking_metrics_path: outputs/beauty_qwen3_local_rank_full973/tables/ranking_metrics.csv
  structured_risk_metrics_path: outputs/beauty_qwen3_local_structured_risk_full973/tables/rerank_results.csv
  literature_baseline_summary_path: outputs/summary/week7_day3_literature_baseline_summary.csv
