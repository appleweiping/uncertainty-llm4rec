project: tallrec
official_repo: https://github.com/SAI990323/TALLRec
seed: 13
output_dir: outputs/server_packets/tallrec_movielens_1m
dataset:
  name: movielens_1m_r2
  processed_dir: data/processed/movielens_1m/r2_full_single_dataset
candidate:
  protocol: sampled
  size: 500
  include_target: true
tallrec:
  max_history_items: 20
  negatives_per_train_example: 63
  expected_external_output: candidate_scores.csv
  notes: Train on pairwise Yes/No rows; score every test candidate and import the Yes probability/logit as the TRUCE candidate score.
