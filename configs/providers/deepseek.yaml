provider_name: deepseek
provider_family: openai_compatible
model_name: deepseek-v4-flash
api_key_env: DEEPSEEK_API_KEY
base_url: https://api.deepseek.com
endpoint: /chat/completions
requires_endpoint_confirmation: false
timeout_seconds: 60
max_concurrency: 1
temperature: 0.0
max_tokens: 1024
extra_body:
  thinking:
    type: disabled
retry:
  max_attempts: 3
  backoff_seconds: 2.0
rate_limit:
  requests_per_minute: 10
cache:
  enabled: true
  cache_dir: outputs/api_cache/deepseek
dry_run:
  default: true
  response_title_source: target_title
notes: Current single-provider pilot target. Real execution still requires explicit user approval, --execute-api, cache/resume, and DEEPSEEK_API_KEY.
