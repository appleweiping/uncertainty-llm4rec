        noisy_test_path: data/processed/amazon_books_small_noisy_nl10/test.jsonl
        noisy_ranking_test_path: data/processed/amazon_books_small_noisy_nl10/ranking_test.jsonl
        model_config: configs/model/qwen3_8b_local.yaml
        rank_model_config: configs/model/qwen3_8b_local.yaml
