week_stage: week7_9_shadow
output_root: outputs
seed: 42
default_topk: 10
default_rank_max_new_tokens: 96
default_rerank_variant: nonlinear_structured_risk_rerank
default_lambda_penalty: 0.5
scenarios:
  small_prior:
    description: Small-scale prior for screening all shadow signals before expensive full replay.
    domains:
      beauty:
        pointwise_valid_path: data/processed/amazon_beauty/valid.jsonl
        pointwise_test_path: data/processed/amazon_beauty/test.jsonl
        ranking_test_path: data/processed/amazon_beauty/ranking_test.jsonl
        noisy_valid_path: data/processed/amazon_beauty_noisy_nl10/valid.jsonl
        noisy_test_path: data/processed/amazon_beauty_noisy_nl10/test.jsonl
        noisy_ranking_test_path: data/processed/amazon_beauty_noisy_nl10/ranking_test.jsonl
        model_config: configs/model/qwen3_8b_local_replay_v2_beauty_full973.yaml
        rank_model_config: configs/model/qwen3_8b_local_replay_v2_beauty_full973.yaml
        max_pointwise_samples: 1200
        max_rank_samples: 300
      books:
        pointwise_valid_path: data/processed/amazon_books_small/valid.jsonl
        pointwise_test_path: data/processed/amazon_books_small/test.jsonl
        ranking_test_path: data/processed/amazon_books_small/ranking_test.jsonl
        noisy_valid_path: data/processed/amazon_books_small_noisy_nl10/valid.jsonl
        noisy_test_path: data/processed/amazon_books_small_noisy_nl10/test.jsonl
        noisy_ranking_test_path: data/processed/amazon_books_small_noisy_nl10/ranking_test.jsonl
        model_config: configs/model/qwen3_8b_local.yaml
        rank_model_config: configs/model/qwen3_8b_local.yaml
        max_pointwise_samples: 1200
        max_rank_samples: 300
  full_replay:
    description: Full week1-week4 shadow replay for the selected variants or all six variants.
    domains:
      beauty:
        pointwise_valid_path: data/processed/amazon_beauty/valid.jsonl
        pointwise_test_path: data/processed/amazon_beauty/test.jsonl
        ranking_test_path: data/processed/amazon_beauty/ranking_test.jsonl
        noisy_valid_path: data/processed/amazon_beauty_noisy_nl10/valid.jsonl
        noisy_test_path: data/processed/amazon_beauty_noisy_nl10/test.jsonl
